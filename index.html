<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowerwalk in Beijing</title>
    <style>
        :root { --brand-white: #FAF8F5; --deep-gray: #2E2E2E; --rose-pink: #F3D7D7; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--brand-white); color: var(--deep-gray); }

        /* 顶部导航 */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; border-bottom: 1px solid #eee; }
        .logo { font-weight: bold; font-size: 1.2rem; }
        .nav-links { display: flex; gap: 20px; font-size: 0.9rem; }
        .qr-icon { width: 30px; height: 30px; background: #eee; cursor: pointer; }

        /* Hero 视觉区 */
        .hero { position: relative; height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero-bg { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity: 0.5; z-index: -1; }
        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .btn-start { background: var(--rose-pink); padding: 10px 30px; border-radius: 20px; border: none; cursor: pointer; margin-top: 20px; }

        /* 卡片区域 */
        .cards-container { display: flex; justify-content: space-around; padding: 40px 5%; gap: 20px; overflow-x: auto; }
        .card { width: 200px; text-align: center; }
        .card-img { width: 150px; height: 150px; border-radius: 50%; background: var(--rose-pink); margin-bottom: 15px; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* 公告区域 */
        .announcements { padding: 40px 5%; background: #fdf5f5; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Flowerwalk in Beijing</div>
        <div class="nav-links">
            <span>Home</span><span>Explore</span><span>Events</span><span>Store</span>
        </div>
        <div class="qr-icon">📱</div>
    </nav>

    <header class="hero">
        <img src="屏幕快照 2026-06-15 上午3.00.47.png" class="hero-bg" alt="背景">
        <h1>Follow the Flowers</h1>
        <p>Discover the City's Soul</p>
        <button class="btn-start" id="open-map-btn">Start Your Walk</button>
    </header>

    <main class="cards-container">
        <div class="card" id="map-btn">
            <div class="card-img"></div>
            <h3>City Walks</h3>
        </div>
        <div class="card" id="guide-btn">
            <div class="card-img"></div>
            <h3>Bloom Guides</h3>
        </div>
        <div class="card" id="activity-btn">
            <div class="card-img"></div>
            <h3>Aesthetic Events</h3>
        </div>
        <div class="card" id="shop-btn">
            <div class="card-img"></div>
            <h3>Collection</h3>
        </div>
    </main>

    <section class="announcements">
        <h2>Latest Announcements</h2>
        <p>March Cherry Blossom routes released...</p>
    </section>

    <div id="map-modal" style="position:fixed; top:100%; left:0; width:100%; height:100%; background:#fff; transition:0.4s; z-index:100;">
        <span id="close-map-btn" style="padding:20px; display:block; cursor:pointer;">&times; Close</span>
        <iframe id="map-iframe" style="width:100%; height:90%; border:none;"></iframe>
    </div>

    <script>
        // 逻辑保持一致，调用 openModal 即可
        const modal = document.getElementById('map-modal');
        function openModal(url) { document.getElementById('map-iframe').src = url; modal.style.top = '0'; }
        
        document.getElementById('open-map-btn').addEventListener('click', () => openModal("map.html"));
        document.getElementById('close-map-btn').addEventListener('click', () => modal.style.top = '100%');
    </script>
</body>
</html>
