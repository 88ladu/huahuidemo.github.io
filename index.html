<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>城市花卉节线上导览</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --bg-color: #f9fdf9;
            --text-main: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }

        header {
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        /* 导航图片容器 */
        .nav-wrapper {
            position: relative;
            width: 100%;
            padding: 20px;
        }

        .nav-img {
            width: 100%;
            border-radius: 20px;
            display: block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 透明点击区域 */
        .click-area {
            position: absolute;
            cursor: pointer;
            /* 调试时可开启下行背景以查看位置 */
            /* background: rgba(255, 0, 0, 0.2); */
        }

        #map-modal {
            position: fixed;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            z-index: 1000;
            transition: top 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
        }
        #map-modal.active { top: 0; }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }

        .modal-body { flex: 1; width: 100%; border: none; }
        .close-btn { font-size: 24px; color: #ff4d4f; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>🌸 2026 城市花卉节</h1>
    </header>

    <main>
        <div class="nav-wrapper">
            <img src="shouyetu.png" class="nav-img" alt="导览图">
            
            <div id="open-map-btn" class="click-area" style="top: 60%; left: 10%; width: 25%; height: 20%;"></div>
            <div id="guide-btn" class="click-area" style="top: 60%; left: 65%; width: 25%; height: 20%;"></div>
            <div id="activity-btn" class="click-area" style="top: 20%; left: 35%; width: 30%; height: 20%;"></div>
        </div>
    </main>

    <div id="map-modal">
        <div class="modal-header">
            <h2>功能页面</h2>
            <span class="close-btn" id="close-map-btn">&times;</span>
        </div>
        <iframe class="modal-body" id="map-iframe" src="" frameborder="0"></iframe>
    </div>

    <script>
        const modal = document.getElementById('map-modal');
        const iframe = document.getElementById('map-iframe');

        function openModal(url) {
            iframe.src = url;
            modal.classList.add('active');
        }

        document.getElementById('open-map-btn').addEventListener('click', () => openModal("map.html"));
        document.getElementById('guide-btn').addEventListener('click', () => openModal("guide.html"));
        document.getElementById('activity-btn').addEventListener('click', () => openModal("activity.html"));

        document.getElementById('close-map-btn').addEventListener('click', () => {
            modal.classList.remove('active');
        });
    </script>
</body>
</html>
