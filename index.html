<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowerwalk in Beijing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --brand-white: #FAF8F5; --deep-gray: #2E2E2E; --rose-pink: #F3D7D7; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--brand-white); color: var(--deep-gray); }

        /* 顶部导航 */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 25px 5%; border-bottom: 1px solid #eee; }
        .logo { font-weight: 500; font-size: 1.1rem; letter-spacing: -0.5px; }
        .nav-links { display: flex; gap: 25px; font-size: 0.85rem; font-weight: 400; color: #666; }
        .qr-icon { width: 28px; height: 28px; background: #ddd; border-radius: 50%; cursor: pointer; }

        /* Hero 视觉区 - 高级感调整 */
        .hero { position: relative; height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .hero-bg { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; opacity: 0.4; z-index: -1; }
        
        .hero h1 { 
            font-size: 4rem;              /* 增大字号 */
            font-weight: 300;             /* 极致细体 */
            letter-spacing: -2px;         /* 收紧间距 */
            margin-bottom: 10px;
        }
        .hero p { font-size: 1.2rem; font-weight: 300; letter-spacing: 1px; color: #888; text-transform: uppercase; }
        
        .btn-start { background: var(--deep-gray); color: white; padding: 12px 35px; border-radius: 50px; border: none; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-start:hover { opacity: 0.8; }

        /* 卡片区域 */
        .cards-container { display: flex; justify-content: center; padding: 60px 5%; gap: 40px; flex-wrap: wrap; }
        .card { width: 180px; text-align: center; cursor: pointer; transition: transform 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card-img {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    margin-bottom: 15px;
    border: 4px solid #fff;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    
    /* 添加这三行来实现图片展示 */
    background-size: cover;          /* 图片铺满圆圈 */
    background-position: center;     /* 图片居中 */
    background-repeat: no-repeat;
}
        .card h3 { font-weight: 400; font-size: 1rem; }
        
        /* 公告区域 */
        .announcements { padding: 40px 10%; background: #fdf5f5; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Flowerwalk in Beijing</div>
        <div class="nav-links">
            <span>Home</span><span>Explore</span><span>Events</span><span>Store</span>
        </div>
        <div class="qr-icon"></div>
    </nav>

    <header class="hero">
        <img src="屏幕快照 2026-06-15 上午3.00.47.png" class="hero-bg" alt="背景">
        <h1>Follow the Flowers</h1>
        <p>Discover the City's Soul</p>
        <button class="btn-start" id="open-map-btn">Start Your Walk</button>
    </header>

    <main class="cards-container">
    <div class="card" id="card-map">
        <div class="card-img" style="background-image: url('citywalk.jpg');"></div>
        <h3>City Walks</h3>
    </div>
    
    <div class="card" id="card-guide">
        <div class="card-img" style="background-image: url('flower.jpg');"></div>
        <h3>Bloom Guides</h3>
    </div>
    
    <div class="card" id="card-activity">
        <div class="card-img" style="background-image: url('events.jpg');"></div>
        <h3>Aesthetic Events</h3>
    </div>
    
    <div class="card" id="card-shop">
        <div class="card-img" style="background-image: url('shop.jpg');"></div>
        <h3>Collection</h3>
    </div>
</main>

    <section class="announcements">
        <h2 style="font-weight: 300; margin-bottom: 15px;">Latest Announcements</h2>
        <p style="color: #666;">March Cherry Blossom routes released — Explore the beauty of spring today.</p>
    </section>

    <div id="map-modal" style="position:fixed; top:100%; left:0; width:100%; height:100%; background:#fff; transition:0.4s; z-index:100;">
        <span id="close-map-btn" style="padding:20px; display:block; cursor:pointer; font-weight:bold;">&times; Close</span>
        <iframe id="map-iframe" style="width:100%; height:90%; border:none;"></iframe>
    </div>

    <script>
        const modal = document.getElementById('map-modal');
        const iframe = document.getElementById('map-iframe');

        function openModal(url) { iframe.src = url; modal.style.top = '0'; }
        
        // 绑定所有卡片点击事件
        document.getElementById('open-map-btn').addEventListener('click', () => openModal("map.html"));
        document.getElementById('card-map').addEventListener('click', () => openModal("map.html"));
        document.getElementById('card-guide').addEventListener('click', () => openModal("guide.html"));
        document.getElementById('card-activity').addEventListener('click', () => openModal("activity.html"));
        document.getElementById('card-shop').addEventListener('click', () => openModal("shop.html"));

        document.getElementById('close-map-btn').addEventListener('click', () => modal.style.top = '100%');
    </script>
</body>
</html>
