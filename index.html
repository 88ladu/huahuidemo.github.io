<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>城市花卉节线上导览</title>
    <style>
        :root {
            --primary-color: #56ab2f;
            --bg-color: #f9fdf9;
            --text-main: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }

        header {
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .nav-wrapper { position: relative; width: 100%; padding: 20px; }
        .nav-img { width: 100%; border-radius: 20px; display: block; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* 点击区域与文字标签 */
        .click-area {
            position: absolute;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text-label {
            background: rgba(255, 255, 255, 0.85);
            padding: 8px 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            backdrop-filter: blur(6px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            pointer-events: none;
        }
        .text-label p { font-size: 10px; color: #666; font-weight: normal; margin-top: 2px; }

        #map-modal {
            position: fixed; top: 100%; left: 0; width: 100%; height: 100%;
            background-color: white; z-index: 1000;
            transition: top 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex; flex-direction: column;
        }
        #map-modal.active { top: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .modal-body { flex: 1; width: 100%; border: none; }
        .close-btn { font-size: 24px; color: #ff4d4f; cursor: pointer; }
    </style>
</head>
<body>

    <header><h1>🌸 2026 城市花卉节</h1></header>

    <main>
        <div class="nav-wrapper">
            <img src="屏幕快照 2026-06-15 上午3.00.47.png" class="nav-img" alt="导览图">
            
            <div id="open-map-btn" class="click-area" style="top: 55%; left: 10%; width: 35%; height: 20%;">
                <div class="text-label">🗺️ 赏花地图<p>实时点位导航</p></div>
            </div>
            
            <div id="guide-btn" class="click-area" style="top: 55%; left: 55%; width: 35%; height: 20%;">
                <div class="text-label">📸 花卉图鉴<p>认识百种名花</p></div>
            </div>
            
            <div id="activity-btn" class="click-area" style="top: 20%; left: 10%; width: 35%; height: 20%;">
                <div class="text-label">📅 活动日程<p>精彩巡游时刻</p></div>
            </div>
            
            <div id="shop-btn" class="click-area" style="top: 20%; left: 55%; width: 35%; height: 20%;">
                <div class="text-label">🎁 文创周边<p>精美纪念好物</p></div>
            </div>
        </div>
    </main>

    <div id="map-modal">
        <div class="modal-header">
            <h2>功能导览</h2>
            <span class="close-btn" id="close-map-btn">&times;</span>
        </div>
        <iframe class="modal-body" id="map-iframe" src="" frameborder="0"></iframe>
    </div>

    <script>
        const modal = document.getElementById('map-modal');
        const iframe = document.getElementById('map-iframe');

        function openModal(url) {
            iframe.src = url;
            modal.classList.add('active');
        }

        document.getElementById('open-map-btn').addEventListener('click', () => openModal("map.html"));
        document.getElementById('guide-btn').addEventListener('click', () => openModal("guide.html"));
        document.getElementById('activity-btn').addEventListener('click', () => openModal("activity.html"));
        document.getElementById('shop-btn').addEventListener('click', () => openModal("shop.html"));

        document.getElementById('close-map-btn').addEventListener('click', () => {
            modal.classList.remove('active');
        });
    </script>
</body>
</html>
