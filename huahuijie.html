<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>城市花卉节线上导览</title>
    <style>
        :root {
            --primary-color: #4CAF50; /* 自然绿 */
            --bg-color: #f9fdf9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #777777;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* 顶部欢迎区 */
        header {
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 功能菜单网格 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            margin-top: -20px;
        }

        .menu-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 25px 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .menu-card:active {
            transform: scale(0.96);
        }

        .menu-card .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .menu-card h3 {
            font-size: 16px;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .menu-card p {
            font-size: 12px;
            color: var(--text-sub);
        }

        /* 子程序弹窗 (Iframe 容器) */
        #map-modal {
            position: fixed;
            top: 100%; /* 初始隐藏在屏幕下方 */
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            z-index: 1000;
            transition: top 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
        }

        #map-modal.active {
            top: 0; /* 激活时滑到顶部 */
        }

        /* 弹窗顶部导航条 */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: white;
            border-bottom: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .modal-header h2 {
            font-size: 18px;
            margin: 0;
        }

        .close-btn {
            font-size: 24px;
            color: #ff4d4f;
            cursor: pointer;
            font-weight: bold;
        }

        /* 嵌入的 iframe 样式 */
        .modal-body {
            flex: 1;
            width: 100%;
            border: none;
        }

    </style>
</head>
<body>

    <header>
        <h1>🌸 2026 城市花卉节</h1>
        <p>探索城市的绿意与繁花，开启你的专属导览</p>
    </header>

    <main>
        <div class="menu-grid">
            <div class="menu-card" id="open-map-btn">
                <div class="icon">🗺️</div>
                <h3>赏花地图</h3>
                <p>植物分布与实时定位</p>
            </div>
            
            <div class="menu-card">
                <div class="icon">📸</div>
                <h3>花卉图鉴</h3>
                <p>认识百种名贵花草</p>
            </div>
            <div class="menu-card">
                <div class="icon">📅</div>
                <h3>活动日程</h3>
                <p>花车巡游与表演时间</p>
            </div>
            <div class="menu-card">
                <div class="icon">🎁</div>
                <h3>文创周边</h3>
                <p>纪念品与花展周边</p>
            </div>
        </div>
    </main>

    <div id="map-modal">
        <div class="modal-header">
            <h2>🗺️ 赏花绿化地图</h2>
            <span class="close-btn" id="close-map-btn">&times;</span>
        </div>
        <iframe class="modal-body" id="map-iframe" src="" frameborder="0"></iframe>
    </div>

    <script>
        // 获取 DOM 元素
        const openBtn = document.getElementById('open-map-btn');
        const closeBtn = document.getElementById('close-map-btn');
        const modal = document.getElementById('map-modal');
        const iframe = document.getElementById('map-iframe');

        // 你的高德地图程序链接 (可以是 Codepen 的导出链接，或者本地另一个 html 文件)
        const YOUR_MAP_APP_URL = "https://codepen.io/你的用户名/full/你的项目ID"; 

        // 打开地图弹窗
        openBtn.addEventListener('click', () => {
            // 如果 iframe 还没有加载链接，则加载它（避免每次打开都重新加载）
            if(!iframe.src || iframe.src === window.location.href) {
                iframe.src = YOUR_MAP_APP_URL;
            }
            modal.classList.add('active');
        });

        // 关闭地图弹窗
        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });
    </script>

</body>
</html>
